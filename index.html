<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MojosariFood Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' },
                        accent: { 400: '#facc15', 500: '#eab308', 600: '#ca8a04' }
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .btn-loading { opacity: 0.7; pointer-events: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 pb-24">
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 -translate-y-20 opacity-0">
        <div class="bg-white shadow-xl border border-slate-100 px-6 py-3 rounded-2xl flex items-center gap-3">
            <i id="toast-icon" class="fas fa-check-circle text-accent-500"></i>
            <span id="toast-msg" class="text-sm font-semibold">Berhasil!</span>
        </div>
    </div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 p-4">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-800 tracking-tighter text-primary-700">MojosariFood<span class="text-accent-500">ADMIN</span></h1>
            <button onclick="load()" class="w-10 h-10 rounded-xl bg-primary-50 text-primary-600 flex items-center justify-center">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">
        <div class="flex gap-2 p-1 bg-white rounded-2xl shadow-sm border border-slate-200">
            <button onclick="showTab('toko')" id="btn-toko" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all bg-primary-600 text-white">MERCHANT</button>
            <button onclick="showTab('menu')" id="btn-menu" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-500">MENU</button>
            <button onclick="showTab('set')" id="btn-set" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-500">SETTINGS</button>
        </div>

        <div id="tab-toko" class="space-y-4">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <h2 class="font-bold flex items-center gap-2"><i class="fas fa-plus-circle text-primary-500"></i> Tambah Merchant</h2>
                <input id="m-nama" type="text" placeholder="Nama Merchant" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm focus:ring-2 focus:ring-primary-500">
                <input id="m-foto" type="text" placeholder="URL Foto Banner" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm">
                <div class="flex gap-2">
                    <input id="m-lat" type="text" placeholder="Lat" class="flex-1 bg-slate-100 p-4 rounded-2xl text-xs" readonly>
                    <input id="m-lng" type="text" placeholder="Lng" class="flex-1 bg-slate-100 p-4 rounded-2xl text-xs" readonly>
                    <button onclick="getGPS()" class="bg-primary-100 text-primary-600 px-4 rounded-2xl text-xs font-bold">GPS</button>
                </div>
                <button id="btn-save-m" onclick="addM()" class="w-full bg-primary-600 text-white py-4 rounded-2xl font-bold shadow-lg">Simpan Merchant</button>
            </div>
            <div id="list-m" class="space-y-2"></div>
        </div>

        <div id="tab-menu" class="hidden space-y-4">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <h2 class="font-bold flex items-center gap-2"><i class="fas fa-utensils text-primary-500"></i> Tambah Menu</h2>
                <select id="sel-m" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm"></select>
                <input id="f-nama" type="text" placeholder="Nama Menu" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm">
                <input id="f-harga" type="number" placeholder="Harga" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm">
                <input id="f-foto" type="text" placeholder="URL Foto Menu" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm">
                <textarea id="f-desc" placeholder="Deskripsi" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm h-24"></textarea>
                <button id="btn-save-f" onclick="addF()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold">Simpan Menu</button>
            </div>
            <div id="list-f" class="space-y-2 text-xs text-slate-400 text-center py-4 italic">Data menu akan muncul setelah merchant dipilih.</div>
        </div>

        <div id="tab-set" class="hidden space-y-4">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                <h2 class="font-bold">Informasi Pembayaran</h2>
                <input id="s-ew" type="text" placeholder="Nomor E-Wallet" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm">
                <input id="s-qr" type="text" placeholder="URL QRIS" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm">
                <button id="btn-save-s" onclick="saveS()" class="w-full bg-primary-600 text-white py-4 rounded-2xl font-bold">Update Settings</button>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwj8iA4DbT4UTm6J2OM5fTkNnrhivXyiGA8PTgPQbAekcacT2mkG1I3cYEjnA6_Kk92vQ/exec';
        let merchants = [];
        let menus = [];

        window.onload = load;

        async function load() {
            try {
                const res = await fetch(`${API_URL}?action=get_all`);
                const data = await res.json();
                merchants = data.merchants || [];
                menus = data.menus || [];
                renderMerchants();
                renderSettings(data.settings);
            } catch (e) { showToast('Gagal memuat data', 'error'); }
        }

        function renderMerchants() {
            const list = document.getElementById('list-m');
            const sel = document.getElementById('sel-m');
            
            list.innerHTML = merchants.map(m => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm">
                    <div class="flex items-center gap-3">
                        <img src="${m.Foto}" class="w-10 h-10 rounded-full object-cover bg-slate-100">
                        <div class="font-bold text-sm text-slate-700">${m.Nama}</div>
                    </div>
                    <button onclick="upStat('${m.ID}', '${m.Status === 'Buka' ? 'Tutup' : 'Buka'}')" 
                        class="px-4 py-2 rounded-xl text-[10px] font-bold text-white transition-all ${m.Status==='Buka'?'bg-green-500':'bg-red-400'}">
                        ${m.Status.toUpperCase()}
                    </button>
                </div>
            `).join('');

            sel.innerHTML = '<option value="">Pilih Merchant</option>' + merchants.map(m => `<option value="${m.ID}">${m.Nama}</option>`).join('');
        }

        function renderSettings(s) {
            const set = s.reduce((acc, curr) => ({ ...acc, [curr.Key]: curr.Value }), {});
            document.getElementById('s-ew').value = set.EWALLET || '';
            document.getElementById('s-qr').value = set.QRIS || '';
        }

        function showTab(t) {
            ['toko','menu','set'].forEach(x => {
                document.getElementById('tab-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('bg-primary-600', 'text-white');
                document.getElementById('btn-'+x).classList.add('text-slate-500');
            });
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('bg-primary-600', 'text-white');
        }

        function getGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('m-lat').value = p.coords.latitude;
                document.getElementById('m-lng').value = p.coords.longitude;
            });
        }

        async function addM() {
            const btn = document.getElementById('btn-save-m');
            const params = new URLSearchParams({
                action: 'add_merchant',
                nama: document.getElementById('m-nama').value,
                foto: document.getElementById('m-foto').value,
                lat: document.getElementById('m-lat').value,
                lng: document.getElementById('m-lng').value
            });
            btn.classList.add('btn-loading');
            try {
                await fetch(`${API_URL}?${params.toString()}`);
                showToast('Merchant disimpan!');
                load();
            } catch (e) { showToast('Gagal simpan', 'error'); }
            finally { btn.classList.remove('btn-loading'); }
        }

        async function addF() {
            const btn = document.getElementById('btn-save-f');
            const params = new URLSearchParams({
                action: 'add_menu',
                mId: document.getElementById('sel-m').value,
                nama: document.getElementById('f-nama').value,
                harga: document.getElementById('f-harga').value,
                foto: document.getElementById('f-foto').value,
                desc: document.getElementById('f-desc').value
            });
            if(!document.getElementById('sel-m').value) return showToast('Pilih merchant!', 'error');
            
            btn.classList.add('btn-loading');
            try {
                await fetch(`${API_URL}?${params.toString()}`);
                showToast('Menu ditambahkan!');
                document.getElementById('f-nama').value = '';
                document.getElementById('f-harga').value = '';
                load();
            } catch (e) { showToast('Gagal tambah menu', 'error'); }
            finally { btn.classList.remove('btn-loading'); }
        }

        async function upStat(id, s) {
            await fetch(`${API_URL}?action=update_status&id=${id}&status=${s}`);
            load();
        }

        async function saveS() {
            const params = new URLSearchParams({
                action: 'save_settings',
                ew: document.getElementById('s-ew').value,
                qr: document.getElementById('s-qr').value
            });
            await fetch(`${API_URL}?${params.toString()}`);
            showToast('Settings diupdate!');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').className = type === 'success' ? 'fas fa-check-circle text-accent-500' : 'fas fa-exclamation-circle text-red-500';
            toast.classList.remove('-translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('-translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
